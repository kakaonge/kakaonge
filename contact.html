<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Kaka Onge</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/contact.css">
   
</head>
<body>

    <div class="noise-overlay"></div>

    <nav class="nav-container">
        <a href="index.html" class="logo">← Back</a>
        <div class="nav-links">
        </div>
    </nav>

    <main class="main-wrapper">
        <div class="content-grid">
            
            <div class="info-col">
                <h1 class="hero-heading">Let's build<br><span>Something Real.</span></h1>
                <p class="intro-text">
                    I am currently open for commissions. Focusing on architectural web experiences, tactile UI, and visual storytelling.
                </p>

                <div class="contact-details">
                    <div class="detail-item">
                        <span class="detail-label">Email :</span>
                        <a href="mailto:kakaonge22@gmail.com" class="detail-value">kakaonge22@gmail.com</a>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Base</span>
                        <span class="detail-value">Nairobi, Kenya</span>
                    </div>
                </div>

                <div class="social-row">
                    <a href="https://www.instagram.com/kakaonge/" class="social-btn">Instagram</a>
                    <a href="https://x.com/Kakaonge" class="social-btn">Twitter / X</a>
                    <a href="https://ke.linkedin.com/in/kaka-onge" class="social-btn">LinkedIn</a>
                    <a href="https://github.com/kakaonge" class="social-btn">GitHub</a>
                </div>
            </div>

            <div class="form-col">
                <form action="https://formsubmit.co/kakaonge22@gmail.com" method="POST">
                    
                    <div class="form-group">
                        <input type="text" id="name" name="name" class="form-input" placeholder=" " required>
                        <label for="name" class="form-label">Name</label>
                    </div>

                    <div class="form-group">
                        <input type="email" id="email" name="email" class="form-input" placeholder=" " required>
                        <label for="email" class="form-label">Email</label>
                    </div>

                    <div class="form-group">
                        <input type="text" id="message" name="message" class="form-input" placeholder=" " required>
                        <label for="message" class="form-label">Brief</label>
                    </div>

                    <button type="submit" class="submit-btn">Send Message</button>
                </form>
            </div>

        </div>
    </main>

    <footer class="page-footer">
        (C) 2026 KAKA ONGE
    </footer>

</body>
</html>
